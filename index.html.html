<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kupa Menajeri</title>
<style>
  :root{
    --pitch:#0a1a12; --pitch2:#0e241a; --line:#1c3a2b;
    --chalk:#eaf3ee; --dim:#7fa08d; --amber:#f2b705; --amber2:#ffd43b;
    --live:#ff3b30; --win:#3ddc84; --panel:#0d1f16; --panel2:#122a1f;
    --card:#102419;
    font-family:"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--chalk);
    background:
      linear-gradient(rgba(6,16,11,.9),rgba(6,16,11,.95)),
      repeating-linear-gradient(0deg,#0a1a12 0 40px,#0c1e15 40px 80px);
    padding:0}
  .wrap{max-width:1000px;margin:0 auto;padding:16px 14px 60px}
  h1,h2,h3{margin:0}
  .cond{font-family:"Arial Narrow","Segoe UI",sans-serif;font-stretch:condensed;
    letter-spacing:.02em;font-weight:800;text-transform:uppercase}

  /* top bar */
  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 0;border-bottom:2px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
  .brand{font-size:22px;letter-spacing:.14em;font-weight:800;text-transform:uppercase}
  .brand b{color:var(--amber)}
  .myteam{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim)}
  .badge{width:26px;height:26px;border-radius:5px;display:inline-block;border:1px solid #000}

  /* nav tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .tab{background:var(--panel);border:1px solid var(--line);color:var(--dim);
    border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;transition:.15s;
    text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  .tab:hover{border-color:var(--amber);color:var(--chalk)}
  .tab.on{background:var(--amber);color:#1a1200;border-color:var(--amber)}

  .screen{display:none}
  .screen.on{display:block}

  /* setup */
  .setup{max-width:520px;margin:6vh auto 0}
  .setup h2{font-size:26px;letter-spacing:.1em;text-align:center;margin-bottom:6px}
  .setup .sub{text-align:center;color:var(--dim);font-size:13px;margin-bottom:24px;letter-spacing:.2em;text-transform:uppercase}
  .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:16px 0 8px}
  .teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
  .teamsel{display:flex;align-items:center;gap:8px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;padding:9px 10px;cursor:pointer;
    font-size:13px;transition:.15s}
  .teamsel:hover{border-color:var(--amber)}
  .teamsel.sel{border-color:var(--amber);background:var(--panel2)}
  .teamsel .rt{margin-left:auto;font-weight:800;color:var(--amber);font-size:12px}
  .go{width:100%;margin-top:22px;background:linear-gradient(180deg,var(--amber2),var(--amber));
    color:#1a1200;border:none;border-radius:10px;padding:15px;font-size:15px;font-weight:800;
    letter-spacing:.08em;cursor:pointer;text-transform:uppercase;box-shadow:0 3px 0 #9c7500}
  .go:active{transform:translateY(2px);box-shadow:0 1px 0 #9c7500}
  .go.sm{width:auto;padding:11px 20px;font-size:13px;margin-top:0}

  /* cards / tables */
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .card h3{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--dim);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
    padding:6px 8px;border-bottom:1px solid var(--line)}
  td{padding:8px 8px;border-bottom:1px solid rgba(28,58,43,.5)}
  tr.me td{background:rgba(242,183,5,.1)}
  tr.adv td{border-left:3px solid var(--win)}
  .num{text-align:center}
  .teamcell{display:flex;align-items:center;gap:8px}
  .dotbadge{width:16px;height:16px;border-radius:3px;flex:none;border:1px solid #000}

  /* fixture / match row */
  .fx{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel);
    border:1px solid var(--line);border-radius:9px;margin-bottom:8px}
  .fx .h{flex:1;text-align:right}.fx .a{flex:1}
  .fx .sc{font-weight:800;min-width:56px;text-align:center;font-size:16px;color:var(--amber)}
  .fx .vs{color:var(--dim);min-width:56px;text-align:center;font-size:12px}
  .fx.mine{border-color:var(--amber)}

  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .spacer{flex:1}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--chalk);
    border-radius:8px;padding:10px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:600}
  .btn:hover{border-color:var(--amber)}
  .btn.amber{background:var(--amber);color:#1a1200;border-color:var(--amber);font-weight:800}
  .btn:disabled{opacity:.4;cursor:default}

  .pill{display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;
    background:var(--panel2);border:1px solid var(--line);color:var(--dim);
    letter-spacing:.08em;text-transform:uppercase}
  .pill.live{background:var(--live);color:#fff;border-color:var(--live);animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.55}}

  /* squad */
  .pl{display:flex;align-items:center;gap:10px;padding:9px 10px;border-bottom:1px solid rgba(28,58,43,.5)}
  .pos{width:34px;text-align:center;font-size:10px;font-weight:800;padding:3px 0;border-radius:4px;letter-spacing:.05em}
  .pos.GK{background:#f2b705;color:#1a1200}.pos.DF{background:#3d7dc0;color:#fff}
  .pos.MF{background:#3ddc84;color:#08301c}.pos.FW{background:#ff5a4d;color:#fff}
  .pl .nm{flex:1}
  .pl .ov{font-weight:800;color:var(--amber);width:34px;text-align:center}
  .pl .st{color:var(--dim);font-size:12px;width:auto}
  .pl.starter{background:rgba(61,220,132,.06)}

  /* live match */
  .scoreboard{background:linear-gradient(180deg,#0c1e15,#081410);border:2px solid var(--line);
    border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
  .scoreboard .clock{font-size:13px;color:var(--amber);letter-spacing:.2em;margin-bottom:10px}
  .scoreboard .teams{display:flex;align-items:center;justify-content:center;gap:18px}
  .scoreboard .tn{flex:1;font-size:clamp(15px,4vw,22px)}
  .scoreboard .tn.h{text-align:right}.scoreboard .tn.a{text-align:left}
  .scoreboard .score{font-size:44px;font-weight:800;color:#fff;min-width:120px}
  .ticker{max-height:220px;overflow:auto;font-size:13px}
  .tick{display:flex;gap:10px;padding:7px 10px;border-bottom:1px solid rgba(28,58,43,.5);
    animation:slidein .3s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1}}
  .tick .m{color:var(--amber);font-weight:800;min-width:34px}
  .tick.goal{background:rgba(61,220,132,.1)}
  .tick.goal .m{color:var(--win)}

  .bracket{display:flex;gap:24px;overflow-x:auto;padding:8px 0}
  .brd-col{display:flex;flex-direction:column;justify-content:space-around;gap:14px;min-width:150px}
  .brd-col h4{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:center;margin-bottom:4px}
  .tie{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12px}
  .tie .t{display:flex;justify-content:space-between;padding:2px 0}
  .tie .t.w{color:var(--win);font-weight:700}
  .grp{margin-bottom:14px}

  .stat-big{font-size:32px;font-weight:800;color:var(--amber)}
  .muted{color:var(--dim);font-size:12px}
  select,input{background:var(--panel2);color:var(--chalk);border:1px solid var(--line);
    border-radius:8px;padding:9px 10px;font-size:13px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--amber);
    color:#1a1200;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;
    box-shadow:0 6px 20px rgba(0,0,0,.5);z-index:50;display:none}
  .lang{cursor:pointer;font-size:12px;color:var(--dim);border:1px solid var(--line);
    border-radius:6px;padding:5px 9px}
  .lang:hover{color:var(--chalk);border-color:var(--amber)}

  /* formation pitch */
  .pitch{position:relative;width:100%;max-width:420px;margin:0 auto;aspect-ratio:2/3;
    background:
      linear-gradient(0deg,rgba(0,0,0,.15),rgba(0,0,0,.15)),
      repeating-linear-gradient(0deg,#14432c 0 12%,#0f3a24 12% 24%);
    border:2px solid #2c6b47;border-radius:10px;overflow:hidden}
  .pitch .midline{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.35)}
  .pitch .circle{position:absolute;top:50%;left:50%;width:80px;height:80px;margin:-40px 0 0 -40px;
    border:2px solid rgba(255,255,255,.3);border-radius:50%}
  .pitch .box{position:absolute;left:50%;width:120px;height:52px;margin-left:-60px;border:2px solid rgba(255,255,255,.28)}
  .pitch .box.top{top:0;border-top:none}.pitch .box.bot{bottom:0;border-bottom:none}
  .spot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;
    align-items:center;gap:2px;cursor:pointer;width:66px}
  .spot .jersey{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:800;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5);color:#fff}
  .spot .pn{font-size:10px;text-align:center;line-height:1.1;max-width:66px;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;background:rgba(0,0,0,.5);padding:1px 4px;border-radius:4px}
  .spot .po{font-size:9px;color:var(--amber);font-weight:800}
  .spot:hover .jersey{transform:scale(1.12)}
  .bench{margin-top:14px}
  .formrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .fbtn{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:8px;
    padding:8px 12px;font-size:13px;cursor:pointer;font-weight:700}
  .fbtn.on{background:var(--amber);color:#1a1200;border-color:var(--amber)}
  .swaphint{font-size:12px;color:var(--dim);text-align:center;margin-top:8px}
  .spot.sel .jersey{outline:3px solid var(--amber);outline-offset:2px}
</style>
</head>

<div class="wrap">

    <div class="row" id="setupContract"></div>
    <button class="go" id="startBtn" disabled>Sezona Başla</button>
  </div>

  <!-- MAIN APP -->

        <span class="pill" id="seasonPill"></span>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab on" data-s="hub">Sezon</button>
      <button class="tab" data-s="squad">Kadro & Taktik</button>
      <button class="tab" data-s="transfer">Transfer</button>
      <button class="tab" data-s="league">Lig</button>
      <button class="tab" data-s="cup">Kupa</button>
      <button class="tab" data-s="champions">Şampiyonlar Kupası</button>
      <button class="tab" data-s="nations">Uluslar</button>
    </div>

    <div class="screen on" id="s-hub"></div>
    <div class="screen" id="s-squad"></div>
    <div class="screen" id="s-transfer"></div>
    <div class="screen" id="s-league"></div>
    <div class="screen" id="s-cup"></div>
    <div class="screen" id="s-champions"></div>
    <div class="screen" id="s-nations"></div>
    <div class="screen" id="s-match"></div>
  </div>

</div>
<div class="toast" id="toast"></div>

// Generate the tournament for a given year in the endless cycle (WC on 4-year, Euro between).
function makeTourneyFor(year){
  // World Cups: 2026, 2030, 2034... (year %4===2). Euros in between (2028,2032,2036...).
  const isWC = (year%4===2);
  if(isWC){
    return {year, name:year+' Dünya Kupası', host:WC_HOSTS[Math.floor(RNG()*WC_HOSTS.length)], type:'wc', done:false, champion:null};
  } else {
    return {year, name:year+' Avrupa Şampiyonası', host:EURO_HOSTS[Math.floor(RNG()*EURO_HOSTS.length)], type:'euro', done:false, champion:null};
  }
}
// Ensure NAT.schedule has an entry at idx (generate future tournaments on demand).
function ensureTourneyAt(idx){
  while(NAT.schedule.length<=idx){
    const last=NAT.schedule[NAT.schedule.length-1];
    NAT.schedule.push(makeTourneyFor(last.year+2));
  }
}

/* ================= RNG ================= */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
let RNG=mulberry32(Date.now()%2147483647);

/* ================= STATE ================= */
let S=null; // whole game state

function makePlayers(rating){
  const arr=[];
  const layout=['GK','DF','DF','DF','DF','MF','MF','MF','FW','FW','FW','GK','DF','MF','FW','DF','MF','FW'];
  for(let i=0;i<18;i++){
    const base=rating+Math.round((RNG()*16)-8);
    // floor scales with team rating: strong clubs never field <60, weak clubs can go down to ~45
    const floor=Math.max(44, rating-14);
    arr.push({name:FIRST[Math.floor(RNG()*FIRST.length)]+' '+LAST[Math.floor(RNG()*LAST.length)],
      pos:layout[i],rating:Math.max(floor,Math.min(96,base)),goals:0,assists:0,apps:0});
  }
  arr.forEach((p,i)=>p.starter=i<11);
  return arr;
}

/* ================= SIM ================= */
function poisson(l){const L=Math.exp(-l);let k=0,p=1;do{k++;p*=RNG();}while(p>L);return k-1;}

/* ---- economy ---- */
// starting budget scales strongly with rating and division
function teamStartBudget(rating, div){
  const base=Math.round(Math.pow(Math.max(0,rating-50),1.7)*0.9); // 60->~120, 89->~600
  const divBonus={1:80,2:40,3:15,4:5}[div]||0;
  return Math.max(8, base+divBonus + Math.round(RNG()*20));
}
// income for a league match by result and division
function matchIncome(result, division){
  // result: 'W' | 'D' | 'L'
  const base={W:12,D:6,L:3}[result];
  const divMul={1:2.2,2:1.5,3:1.1,4:0.8}[division]||1;
  return Math.round(base*divMul);
}
function addIncome(teamId, res){ // res 'W'/'D'/'L'
  const t=byId(teamId); if(t._budget===undefined)t._budget=0;
  t._budget += matchIncome(res, t.div);
}

function teamStrength(t){
  const st=t.players.filter(p=>p.starter);
  const avg=st.reduce((s,p)=>s+p.rating,0)/(st.length||1);
  const tac=TACTICS[t.tactic||'balanced'];
  return {atk:avg+tac.atk, def:avg+tac.def, avg};
}
const TACTICS={
  defensive:{atk:-3,def:5,label:'Defansif',label_en:'Defensive'},
  balanced:{atk:0,def:0,label:'Dengeli',label_en:'Balanced'},
  attacking:{atk:5,def:-3,label:'Hücum',label_en:'Attacking'},
  allout:{atk:9,def:-8,label:'Total Hücum',label_en:'All-out Attack'}
};
function pickScorer(t){
  const w=t.players.filter(p=>p.starter).map(p=>p.pos==='FW'?5:p.pos==='MF'?3:p.pos==='DF'?1:0.05);
  const st=t.players.filter(p=>p.starter);
  const tot=w.reduce((a,b)=>a+b,0);let r=RNG()*tot;
  for(let i=0;i<st.length;i++){r-=w[i];if(r<=0)return st[i];}
  return st[st.length-1];
}
function pickAssister(t,scorer){
  // assists tend to come from mids/wingers; exclude the scorer; ~30% of goals are solo (no assist)
  if(RNG()<0.30) return null;
  const st=t.players.filter(p=>p.starter && p!==scorer);
  if(!st.length) return null;
  const w=st.map(p=>p.pos==='MF'?5:p.pos==='FW'?3:p.pos==='DF'?1.5:0.1);
  const tot=w.reduce((a,b)=>a+b,0);let r=RNG()*tot;
  for(let i=0;i<st.length;i++){r-=w[i];if(r<=0)return st[i];}
  return st[st.length-1];
}
function simMatch(home,away,opts={}){
  const H=teamStrength(home),A=teamStrength(away);
  const homeAdv=opts.neutral?0:3;
  const sh=H.atk+homeAdv+(RNG()*10-5);
  const sa=A.atk+(RNG()*10-5);
  const dh=sh-A.def, da=sa-H.def;
  const lamH=Math.max(0.18,1.3+dh*0.045);
  const lamA=Math.max(0.18,1.05+da*0.045);
  let hg=poisson(lamH),ag=poisson(lamA);
  const events=[],mins=[];
  function goals(n,team,isHome){for(let i=0;i<n;i++){let m;do{m=1+Math.floor(RNG()*90);}while(mins.includes(m));mins.push(m);const sc=pickScorer(team);const as=pickAssister(team,sc);events.push({min:m,teamId:team.id,scorer:sc,assist:as,home:isHome});}}
  goals(hg,home,true);goals(ag,away,false);
  events.sort((a,b)=>a.min-b.min);
  return {hg,ag,events,home,away,opts};
}
function commitStats(res){
  [res.home,res.away].forEach(t=>t.players.filter(p=>p.starter).forEach(p=>p.apps++));
  res.events.forEach(e=>{ e.scorer.goals++; if(e.assist) e.assist.assists++; });
}

/* ================= FIXTURES ================= */
function makeFixtures(ids){
  let a=ids.slice(); if(a.length%2)a.push(null);
  const n=a.length,rounds=n-1,half=n/2,first=[];
  let arr=a.slice();
  for(let r=0;r<rounds;r++){
    const round=[];
    for(let i=0;i<half;i++){const h=arr[i],aw=arr[n-1-i];if(h!==null&&aw!==null)round.push(r%2?[aw,h]:[h,aw]);}
    first.push(round);
    arr=[arr[0],...arr.slice(2),arr[1]];
  }
  const second=first.map(rd=>rd.map(([h,aw])=>[aw,h]));
  return first.concat(second);
}

/* ================= TABLE ================= */
function emptyRow(t){return {id:t.id,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};}
function applyResult(tbl,h,a,hg,ag){const H=tbl[h],A=tbl[a];H.P++;A.P++;H.GF+=hg;H.GA+=ag;A.GF+=ag;A.GA+=hg;if(hg>ag){H.W++;A.L++;H.Pts+=3;}else if(hg<ag){A.W++;H.L++;A.Pts+=3;}else{H.D++;A.D++;H.Pts++;A.Pts++;}}
function anyName(id){ const t=(S&&S.teams&&S.teams.find(x=>x.id===id)) || (NAT&&NAT.teams&&NAT.teams.find(x=>x.id===id)); return t?t.name:id; }
function sortTable(rows){return rows.slice().sort((x,y)=>y.Pts-x.Pts||(y.GF-y.GA)-(x.GF-x.GA)||y.GF-x.GF||anyName(x.id).localeCompare(anyName(y.id)));}

/* ================= HELPERS ================= */
function byId(id){return S.teams.find(t=>t.id===id);}
function badge(t,size){size=size||16;return '<span class="dotbadge" style="width:'+size+'px;height:'+size+'px;background:linear-gradient(135deg,'+t.c1+' 50%,'+t.c2+' 50%)"></span>';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',2200);}

// during setup, teams don't have players yet; wrap for badge()
function _t(t){return t;}

function startSeason(myId, seasonNo, divMap, carry){
  seasonNo = seasonNo||1;
  RNG=mulberry32((Date.now()^ (myId.charCodeAt(0)*7919) ^ (seasonNo*104729))>>>0);
  // teams; apply carried-over division + rating/budget if provided
  const teams=TEAMS.map(t=>{
    const div = (divMap&&divMap[t.id])||t.div;
    // rating: carried over if provided, else base with slight season variation
    let rating = (carry&&carry.rating&&carry.rating[t.id]!=null) ? carry.rating[t.id]
                 : Math.max(52, Math.min(94, t.rating + Math.round(RNG()*4-2)));
    // budget: carried over if provided, else derived from rating (stronger = richer)
    let budget = (carry&&carry.budget&&carry.budget[t.id]!=null) ? carry.budget[t.id]
                 : teamStartBudget(rating, div);
    return Object.assign({},t,{div, rating, _budget:budget, players:makePlayers(rating),tactic:'balanced'});
  });
  const div1=teams.filter(t=>t.div===1).map(t=>t.id);
  const div2=teams.filter(t=>t.div===2).map(t=>t.id);
  const div3=teams.filter(t=>t.div===3).map(t=>t.id);
  const div4=teams.filter(t=>t.div===4).map(t=>t.id);

  function buildLeague(ids){
    const fix=makeFixtures(ids);
    const table={}; ids.forEach(id=>table[id]=emptyRow(byIdIn(teams,id)));
    return {fix, round:0, table, results:[]};
  }
  const leagues={1:buildLeague(div1), 2:buildLeague(div2), 3:buildLeague(div3), 4:buildLeague(div4)};

  // CUP: national cup — all teams, single elimination. Random draw.
  const cupOrder=teams.map(t=>t.id).sort(()=>RNG()-0.5);
  // CHAMPIONS: top division (16 teams) -> 4 groups of 4 -> knockout of 8
  const champShuffle=div1.slice().sort(()=>RNG()-0.5);
  const groups=[[],[],[],[]];champShuffle.forEach((id,i)=>groups[i%4].push(id));
  const groupTables=groups.map(g=>{const o={};g.forEach(id=>o[id]=emptyRow(byIdIn(teams,id)));return o;});
  const groupFix=groups.map(g=>groupRounds(g));

  S={
    teams, myId, season:seasonNo,
    leagues,
    cup:{order:cupOrder, round:0, ties:[], done:false, champion:null,
      roundNames:['Ön Tur','Son 32','Son 16','Çeyrek Final','Yarı Final','Final']},
    champions:{groups, groupTables, groupFix, groupRound:0, phase:'group', advancers:null, koRound:0, ties:[], champion:null, koNames:['Çeyrek Final','Yarı Final','Final']},
    log:[]
  };
  S.cup.ties=[pairUp(cupOrder)];
  assignTargets(); // each team gets a season goal based on its strength within its division

  // ---- MANAGER CONTRACT & EXPERIENCE ----
  // Staying at same club with years remaining: decrement existing contract.
  // Otherwise (new club): use the length the player chose when signing.
  if(carry && carry.managerTeam===myId && carry.managerYears>1){
    S.managerYears = carry.managerYears-1;
  } else {
    S.managerYears = (carry&&carry.signYears) || _setupYears || 2;
  }
  // manager experience points carry across seasons
  S.managerXP = (carry&&carry.managerXP!=null) ? carry.managerXP : 0;

  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  const my=byId(myId);
  document.getElementById('myBadge').style.background='linear-gradient(135deg,'+my.c1+' 50%,'+my.c2+' 50%)';
  document.getElementById('myTeamName').textContent=my.name;
  document.getElementById('seasonPill').textContent='Sezon '+S.season;
  _selSpot=null;_selBench=null;_viewDiv=my.div;
  show('hub');
}
// Assign a seasonal target to each team based on rank within its division.
function assignTargets(){
  ALL_DIVS.forEach(d=>{
    const ids=Object.keys(S.leagues[d].table);
    const ranked=ids.map(id=>byId(id)).sort((a,b)=>b.rating-a.rating);
    const n=ranked.length;
    ranked.forEach((t,i)=>{
      let goal;
      if(d===1){
        if(i<3) goal={type:'champion',text:'Şampiyonluk (1.lik)',rankNeeded:1};
        else if(i<8) goal={type:'top',text:'İlk 4 (Şampiyonlar Kupası)',rankNeeded:4};
        else goal={type:'safe',text:'Küme düşmemek',rankNeeded:n-3};
      } else {
        if(i<3) goal={type:'promo',text:'Üst lige çıkmak (ilk 3)',rankNeeded:3};
        else if(i<8) goal={type:'top',text:'İlk yarıda bitirmek',rankNeeded:Math.floor(n/2)};
        else goal={type:'safe',text:'Küme düşmemek',rankNeeded:n-3};
      }
      t.target=goal;
    });
  });
}
function byIdIn(teams,id){return teams.find(t=>t.id===id);}
function pairUp(ids){const t=[];for(let i=0;i<ids.length;i+=2)t.push({h:ids[i],a:ids[i+1],hg:null,ag:null,winner:null});return t;}
function groupRounds(g){
  // shuffle group order so the round-robin schedule isn't predictable, and randomize home/away
  let a=g.slice().sort(()=>RNG()-0.5);
  const n=4,rounds=3,half=2,out=[];
  for(let r=0;r<rounds;r++){
    const round=[];
    for(let i=0;i<half;i++){
      let h=a[i], aw=a[n-1-i];
      if(RNG()<0.5){ const t=h; h=aw; aw=t; } // random home/away
      round.push([h,aw]);
    }
    out.push(round);
    a=[a[0],...a.slice(2),a[1]];
  }
  // shuffle the order of the 3 rounds too
  return out.sort(()=>RNG()-0.5);
}

/* ================= PROMOTION / RELEGATION ================= */
// Chain across 4 divisions: each division's bottom 3 go down, top 3 of the division
// below come up. Div 1 has no promotion; Div 4 has no relegation.
function promRelPairs(){
  // returns {relegated:{div:[ids]}, promoted:{div:[ids]}} for display
  const rel={}, pro={};
  ALL_DIVS.forEach(d=>{
    const sorted=sortTable(Object.values(S.leagues[d].table));
    if(d<4) rel[d]=sorted.slice(-3).map(r=>r.id);   // bottom 3 drop (except div4)
    if(d>1) pro[d]=sorted.slice(0,3).map(r=>r.id);   // top 3 rise (except div1)
  });
  return {rel,pro};
}
function nextDivMap(){
  const map={};
  S.teams.forEach(t=>map[t.id]=t.div);
  const {rel,pro}=promRelPairs();
  ALL_DIVS.forEach(d=>{
    (rel[d]||[]).forEach(id=>map[id]=d+1); // down a division
    (pro[d]||[]).forEach(id=>map[id]=d-1); // up a division
  });
  return map;
}

/* ================= MANAGER OFFERS ================= */
// What division of clubs will approach the manager, based on accumulated XP.
// XP is earned by good seasons. Start ~0 => only div 3-4 clubs.
function highestDivOpen(xp){
  if(xp>=40) return 1;   // elite: top-flight clubs
  if(xp>=22) return 2;   // established: 2nd division and some 1st
  if(xp>=8)  return 3;   // rising: 3rd division and up
  return 4;              // rookie: only 4th (and 3rd) division
}
function managerOffers(finalPos, wonLeague, wonCup, wonEuro, myDiv){
  const xp=S.managerXP||0;
  const openDiv=highestDivOpen(xp); // clubs from this division (and below) may approach
  // performance this season nudges which clubs within the open range are interested
  let perf=(17-finalPos)/16; // 0..1
  if(wonLeague)perf+=0.3; if(wonCup)perf+=0.15; if(wonEuro)perf+=0.4;
  const pool=S.teams.filter(t=>t.id!==S.myId && t.div>=openDiv); // openDiv=1 => all; openDiv=3 => div3+div4
  pool.sort((a,b)=>a.div-b.div || b.rating-a.rating); // prefer higher divisions first
  const offers=[];
  // pick a spread: a couple of ambitious (higher) clubs + a safe option
  const higher=pool.filter(t=>t.div===openDiv);
  const lower=pool.filter(t=>t.div>openDiv);
  higher.slice(0, perf>0.5?2:1).forEach(t=>offers.push({id:t.id,note:openDiv===1?'Büyük kulüp seni istiyor':(openDiv+'. lig kulübü')}));
  lower.slice(0,2).forEach(t=>offers.push({id:t.id,note:'İstikrarlı teklif'}));
  if(offers.length<2){pool.slice(0,3).forEach(t=>{if(!offers.find(o=>o.id===t.id))offers.push({id:t.id,note:'Teklif'});});}
  return offers.slice(0,4);
}
// XP earned from a season's outcome.
function seasonXP(finalPos, wonLeague, wonCup, wonEuro, myDiv, targetMet){
  let xp=0;
  // finishing high in a higher division is worth more
  const divWeight={1:4,2:3,3:2,4:1}[myDiv]||1;
  if(finalPos<=3) xp += 4*divWeight/2;
  else if(finalPos<=8) xp += 2*divWeight/2;
  if(wonLeague) xp += 5;
  if(wonCup) xp += 4;
  if(wonEuro) xp += 8;
  if(targetMet) xp += 3;
  return Math.round(xp);
}
function buildCarry(){
  const carry={rating:{}, budget:{}};
  const {rel,pro}=promRelPairs();
  const relSet=new Set(Object.values(rel).flat());
  const proSet=new Set(Object.values(pro).flat());
  ALL_DIVS.forEach(d=>{
    const sorted=sortTable(Object.values(S.leagues[d].table));
    const n=sorted.length;
    sorted.forEach((r,i)=>{
      const t=byId(r.id);
      let delta=0;
      if(i< n*0.25) delta+=1;
      else if(i> n*0.75) delta-=1;
      if(proSet.has(t.id)) delta+=1;
      if(relSet.has(t.id)) delta-=1;
      delta += Math.round(RNG()*2-1);
      carry.rating[t.id]=Math.max(52,Math.min(94, t.rating+delta));
      carry.budget[t.id]=t._budget||0;
    });
  });
  carry.managerXP=S.managerXP||0; // XP added in acceptJob before startSeason
  return carry;
}
function acceptJob(newId, signYears){
  const nextSeason=S.season+1;
  const prevName=byId(S.myId).name;
  const stayingSameClub=(newId===S.myId);

  // award XP for the season just completed
  const my=byId(S.myId);
  const sorted=sortTable(Object.values(S.leagues[my.div].table));
  const finalPos=sorted.findIndex(r=>r.id===S.myId)+1;
  const wonLeague=sorted[0].id===S.myId, wonCup=S.cup.champion===S.myId, wonEuro=S.champions.champion===S.myId;
  const tgt=my.target;
  let met=true;
  if(tgt){
    if(tgt.type==='champion')met=wonLeague;
    else if(tgt.type==='promo')met=finalPos<=3;
    else met=finalPos<=tgt.rankNeeded;
  }
  const gained=seasonXP(finalPos,wonLeague,wonCup,wonEuro,my.div,met);
  S.managerXP=(S.managerXP||0)+gained;

  const divMap=nextDivMap();
  const carry=buildCarry();
  if(stayingSameClub){ carry.managerTeam=newId; carry.managerYears=S.managerYears||1; }
  else { carry.managerTeam=newId; carry.managerYears=0; carry.signYears=signYears||2; }
  startSeason(newId, nextSeason, divMap, carry);
  const nm=byId(S.myId).name;
  toast(nm===prevName?('Yeni sezon! (+'+gained+' deneyim) '+nm):(nm+' başına geçtin! (+'+gained+' deneyim)'));
}

// give players stable ids and build a lineup array matching current formation
function ensureLineup(my){
  if(!my.formation||!FORMATIONS[my.formation])my.formation='4-3-3';
  my.players.forEach((p,i)=>{ if(!p._id)p._id='p'+i+'_'+Math.floor(RNG()*1e6); });
  const form=FORMATIONS[my.formation];
  if(!my.lineup||my.lineup.length!==form.slots.length){
    // build from current starters, matching by position where possible
    buildLineup(my);
  }
  // sync starter flags from lineup
  const inLineup=new Set(my.lineup.filter(Boolean));
  my.players.forEach(p=>p.starter=inLineup.has(p._id));
}
function buildLineup(my){
  const form=FORMATIONS[my.formation];
  const used=new Set();
  const lineup=form.slots.map(slot=>{
    // best available player of this exact position
    const cand=my.players.filter(p=>!used.has(p._id)&&p.pos===slot.pos).sort((a,b)=>b.rating-a.rating)[0];
    if(cand){used.add(cand._id);return cand._id;}
    return null;
  });
  // fill empty slots with any best remaining
  form.slots.forEach((slot,i)=>{
    if(!lineup[i]){
      const cand=my.players.filter(p=>!used.has(p._id)).sort((a,b)=>b.rating-a.rating)[0];
      if(cand){used.add(cand._id);lineup[i]=cand._id;}
    }
  });
  my.lineup=lineup;
}

  const my=byId(S.myId);
  if(_selBench){ // put bench player into this slot
    const benchId=_selBench;
    const old=my.lineup[si];
    my.lineup[si]=benchId;
    // old starter goes to bench automatically (not in lineup)
    _selBench=null;_selSpot=null;
    syncStarters(my);renderSquad();return;
  }
  if(_selSpot===null){_selSpot=si;renderSquad();return;}
  if(_selSpot===si){_selSpot=null;renderSquad();return;}
  // swap two pitch slots
  const tmp=my.lineup[_selSpot];my.lineup[_selSpot]=my.lineup[si];my.lineup[si]=tmp;
  _selSpot=null;syncStarters(my);renderSquad();
}
function benchTap(pid){
  const my=byId(S.myId);
  if(_selSpot!==null){ // move bench player into selected slot
    my.lineup[_selSpot]=pid;
    _selSpot=null;_selBench=null;syncStarters(my);renderSquad();return;
  }
  _selBench=(_selBench===pid)?null:pid;renderSquad();
}
function syncStarters(my){const inL=new Set(my.lineup.filter(Boolean));my.players.forEach(p=>p.starter=inL.has(p._id));}

function autoPick(){

  _selSpot=null;_selBench=null;
  renderSquad();toast('En iyi 11 seçildi.');
}

function loanOutPrice(p){ return Math.max(2,Math.round((p.rating-50)*0.5)); }
function loanOutPlayer(idx){
  const my=byId(S.myId);
  const p=my.players[idx];
  if(!p)return;
  if(p._loan){toast('Kiralık oyuncu kiraya verilemez.');return;}
  if(my.players.filter(x=>!x._loan).length<=11){toast('Kadro 11 oyuncunun altına düşemez.');return;}
  const fee=loanOutPrice(p);
  // find a club that wants him (weaker or similar clubs happy to take a loan)
  my.players.splice(idx,1);
  if(my._budget===undefined)my._budget=100;
  my._budget+=fee;
  toast(p.name+' 1 sezonluğuna kiraya verildi! (+'+fee+') Sezon sonu döner.');
  renderTransfer();
}
function setContractYears(y){window._contractYears=y;renderTransfer();}
function buyPrice(p,years){ // permanent: base * year multiplier
  const base=Math.max(5,Math.round((p.rating-55)*1.6));
  const mult=1 + (years-2)*0.18; // 2y=1.0, 6y=1.72
  return Math.max(5,Math.round(base*mult));
}
function loanPrice(p){ return Math.max(2,Math.round((p.rating-55)*0.6)); } // much cheaper
function sellPrice(p){ return Math.max(4,Math.round((p.rating-55)*1.4)); }

function transferRefused(from,my){
  const diff = from.rating - my.rating;
  let refuse = 0.20 + diff*0.04;
  if(from.div < my.div) refuse += 0.15;
  if(from.div > my.div) refuse -= 0.10;
  refuse = Math.max(0.05, Math.min(0.85, refuse));
  return RNG() < refuse;
}

function buyPlayer(fromId,idx,years){
  const my=byId(S.myId);if(my._budget===undefined)my._budget=100;
  const from=byId(fromId);const p=from.players[idx];
  if(!p)return;
  const cost=buyPrice(p,years);
  if(my._budget<cost){toast('Bütçe yetersiz ('+cost+' gerekli).');return;}
  if(transferRefused(from,my)){toast(p.name+' teklifini reddetti — mevcut takımında kalmak istiyor.');return;}
  from.players.splice(idx,1);
  from.players.push(newYouth(p.pos));
  p.starter=false;delete p._id;delete p._loan;p._years=years; my.players.push(p);
  my._budget-=cost;
  toast(p.name+' '+years+' yıllık sözleşmeyle katıldı! (-'+cost+')');
  renderTransfer();
}
function loanPlayer(fromId,idx){
  const my=byId(S.myId);if(my._budget===undefined)my._budget=100;
  const from=byId(fromId);const p=from.players[idx];
  if(!p)return;
  const cost=loanPrice(p);
  if(my._budget<cost){toast('Bütçe yetersiz ('+cost+' gerekli).');return;}
  if(transferRefused(from,my)){toast(p.name+' kiralanmayı reddetti.');return;}
  // remove from origin, keep a marker so it returns at season end
  from.players.splice(idx,1);
  from.players.push(newYouth(p.pos)); // temp cover for origin
  p.starter=false;delete p._id;p._loan=fromId; my.players.push(p);
  my._budget-=cost;
  toast(p.name+' 1 sezonluğuna kiralandı! (-'+cost+')');
  renderTransfer();
}
function newYouth(pos){return {name:FIRST[Math.floor(RNG()*FIRST.length)]+' '+LAST[Math.floor(RNG()*LAST.length)],pos,rating:Math.max(55,Math.round(60+RNG()*8)),goals:0,assists:0,apps:0,starter:false};}

function sellPlayer(idx){
  const my=byId(S.myId);
  const p=my.players[idx];
  if(!p)return;
  if(p._loan){toast('Kiralık oyuncu satılamaz.');return;}
  if(my.players.filter(x=>!x._loan).length<=11){toast('Kadro 11 oyuncunun altına düşemez.');return;}
  if(RNG()<0.80){toast('Alıcı çıkmadı — '+p.name+' satılamadı.');return;}
  const price=sellPrice(p);
  my.players.splice(idx,1);
  if(my._budget===undefined)my._budget=100;
  my._budget+=price;
  toast(p.name+' '+price+' karşılığında satıldı!');
  renderTransfer();
}

function playLeagueRound(div){ // plays one round of a division, returns true if played
  const L=S.leagues[div];
  if(L.round>=L.fix.length)return false;
  L.fix[L.round].forEach(([h,a])=>{
    const res=simMatch(byId(h),byId(a));
    applyResult(L.table,h,a,res.hg,res.ag);
    commitStats(res);
    creditMatch(h,a,res.hg,res.ag);
    L.results.push({h,a,hg:res.hg,ag:res.ag});
  });
  L.round++;
  return true;
}
function creditMatch(h,a,hg,ag){
  // Only the HOME team earns matchday income (deplasmanda para yok).
  if(hg>ag) addIncome(h,'W');
  else if(hg<ag) addIncome(h,'L');
  else addIncome(h,'D');
}

function playMyMatch(){
  const myDiv=byId(S.myId).div;
  const L=S.leagues[myDiv];
  if(L.round>=L.fix.length){toast('Lig bitti.');return;}
  const mine=L.fix[L.round].find(([h,a])=>h===S.myId||a===S.myId);
  if(!mine){simWeek();return;}
  const res=simMatch(byId(mine[0]),byId(mine[1]));
  L.fix[L.round].forEach(([h,a])=>{
    if(h===mine[0]&&a===mine[1]){applyResult(L.table,h,a,res.hg,res.ag);commitStats(res);creditMatch(h,a,res.hg,res.ag);L.results.push({h,a,hg:res.hg,ag:res.ag});}
    else{const r=simMatch(byId(h),byId(a));applyResult(L.table,h,a,r.hg,r.ag);commitStats(r);creditMatch(h,a,r.hg,r.ag);L.results.push({h,a,hg:r.hg,ag:r.ag});}
  });
  L.round++;
  // advance other divisions silently
  ALL_DIVS.filter(d=>d!==myDiv).forEach(d=>playLeagueRound(d));
  liveMatch(res,()=>{show('hub');});
}

/* ================= LIVE MATCH VIEWER ================= */
// Generate a penalty shootout that ends with the intended winner ahead. Never ties.
function makeShootout(winnerHome){
  // Realistic shootout: 5 kicks each, stop early once mathematically decided; then sudden death.
  // Guaranteed to end with the intended winner ahead.
  let h=0,a=0,kicks=[];
  const conv=(isWinner)=> RNG() < (isWinner?0.80:0.68);
  // helper: can the trailing team still catch up given kicks remaining in the best-of-5 phase?
  function decidedInFive(hTaken,aTaken){
    // remaining kicks for each within first 5
    const hRem=5-hTaken, aRem=5-aTaken;
    if(h> a+aRem) return true;   // A can't catch H even scoring all remaining
    if(a> h+hRem) return true;   // H can't catch A
    return false;
  }
  let hTaken=0,aTaken=0,turn='H';
  // Best-of-5 phase, alternating H then A, stop early if decided
  while(hTaken<5 || aTaken<5){
    if(turn==='H'){
      if(hTaken<5){ const s=conv(winnerHome); kicks.push({team:'H',scored:s,round:hTaken+1}); if(s)h++; hTaken++; }
      turn='A';
    } else {
      if(aTaken<5){ const s=conv(!winnerHome); kicks.push({team:'A',scored:s,round:aTaken+1}); if(s)a++; aTaken++; }
      turn='H';
    }
    if(decidedInFive(hTaken,aTaken)) break;
  }
  // Sudden death if level after 5 (or after early stop that left them equal)
  let guard=0;
  while(h===a && guard<30){
    const hs=conv(winnerHome); kicks.push({team:'H',scored:hs,sd:true}); if(hs)h++;
    const as=conv(!winnerHome); kicks.push({team:'A',scored:as,sd:true}); if(as)a++;
    guard++;
  }
  // Force the intended winner ahead if somehow still level/wrong
  while( (winnerHome && h<=a) || (!winnerHome && a<=h) ){
    if(winnerHome){ kicks.push({team:'H',scored:true,sd:true}); h++; kicks.push({team:'A',scored:false,sd:true}); }
    else { kicks.push({team:'H',scored:false,sd:true}); kicks.push({team:'A',scored:true,sd:true}); a++; }
  }
  return {kicks,hg:h,ag:a};
}

function liveMatch(res,onEnd,penInfo){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  const el=document.getElementById('s-match');el.classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  const H=res.home,A=res.away;
  const isDrawKO = !!penInfo; // caller decided this tie needs extra time + penalties
  el.innerHTML='<div class="scoreboard"><div class="clock"><span class="pill live" id="liveTag">CANLI</span> <span id="clk">0\'</span></div>'+
    '<div class="teams"><div class="tn h cond">'+H.name+'</div>'+badge(H,30)+'<div class="score" id="liveScore">0 - 0</div>'+badge(A,30)+'<div class="tn a cond">'+A.name+'</div></div>'+
    '<div id="penBoard" style="margin-top:10px;font-size:13px;color:var(--amber);display:none"></div></div>'+
    '<div class="card"><h3>Maç Anlatımı</h3><div class="ticker" id="ticker"></div></div>'+
    '<div class="row"><button class="btn" onclick="skipMatch()">Geç →</button><span class="spacer"></span><button class="btn amber" id="matchDone" style="display:none">Devam</button></div>';
  let hg=0,ag=0,min=0;
  const ticker=document.getElementById('ticker');
  const evs=res.events.slice();
  window._skip=false;
  function tickLine(m,txt,cls){const line=document.createElement('div');line.className='tick'+(cls?' '+cls:'');line.innerHTML='<span class="m">'+m+'</span><span>'+txt+'</span>';ticker.appendChild(line);ticker.scrollTop=ticker.scrollHeight;}
  function showDone(){const db=document.getElementById('matchDone');db.style.display='inline-block';db.onclick=onEnd;}

  function finishRegulation(){
    document.getElementById('clk').textContent="90'";
    document.getElementById('liveScore').textContent=res.hg+' - '+res.ag;
    if(isDrawKO){
      // go to extra time + penalties
      document.getElementById('liveTag').textContent='UZATMA';
      tickLine('90\'','⏱️ Eşitlik bozulmadı. Uzatma ve penaltılara gidiliyor...','');
      setTimeout(extraTime, 700);
    } else {
      document.getElementById('liveTag').textContent='BİTTİ';document.getElementById('liveTag').classList.remove('live');
      tickLine('FT','Maç bitti: '+H.short+' '+res.hg+'-'+res.ag+' '+A.short,'');
      showDone();
    }
  }
  function extraTime(){
    tickLine('105\'','⏱️ Uzatmalar oynanıyor...','');
    setTimeout(()=>{
      tickLine('120\'','⏱️ Uzatmalar da '+res.hg+'-'+res.ag+' bitti. PENALTILAR!','goal');
      document.getElementById('liveTag').textContent='PENALTILAR';
      startShootout();
    }, 800);
  }
  function startShootout(){
    const winnerHome = penInfo.winner===H.id;
    const so = makeShootout(winnerHome);
    penInfo._so = so;
    const board=document.getElementById('penBoard');
    board.style.display='block';
    let ph=0,pa=0,i=0;
    board.innerHTML='<b>'+H.short+'</b> 0 - 0 <b>'+A.short+'</b>';
    tickLine('PEN','🥅 Penaltı atışları başlıyor!','goal');
    const ptimer=setInterval(()=>{
      if(i>=so.kicks.length || window._skip){
        clearInterval(ptimer);
        ph=so.hg;pa=so.ag;
        board.innerHTML='<b>'+H.short+'</b> '+ph+' - '+pa+' <b>'+A.short+'</b>';
        document.getElementById('liveTag').textContent='BİTTİ';document.getElementById('liveTag').classList.remove('live');
        const winShort = penInfo.winner===H.id?H.short:A.short;
        tickLine('PEN','🏆 '+winShort+' penaltılarla turladı! ('+ph+'-'+pa+')','goal');
        showDone();
        return;
      }
      const k=so.kicks[i];
      if(k.team==='H'){ if(k.scored)ph++; } else { if(k.scored)pa++; }
      board.innerHTML='<b'+(k.team==='H'?' style="color:#fff"':'')+'>'+H.short+'</b> '+ph+' - '+pa+' <b'+(k.team==='A'?' style="color:#fff"':'')+'>'+A.short+'</b>';
      const who=k.team==='H'?H:A;
      const label=k.sd?'(uzatma) ':'';
      tickLine('PEN', (k.scored?'✅ GOL':'❌ KAÇTI')+' — '+label+who.short+' ('+who.name+')', k.scored?'goal':'');
      i++;
    }, 550);
  }

  const timer=setInterval(()=>{
    if(window._skip){clearInterval(timer);hg=res.hg;ag=res.ag;
      evs.forEach(e=>addTick(e));finishRegulation();return;}
    min+=2;
    if(min>90){clearInterval(timer);finishRegulation();return;}
    document.getElementById('clk').textContent=min+"'";

  },90);
  function addTick(e){

/* ================= CUP (single elimination) ================= */
// Resolve a cup tie. Final (isFinal) is single match; other rounds are two-legged (aggregate).
// Stores tie.leg1, tie.leg2 (if two-leg), tie.aggH, tie.aggA, tie.pens, tie.winner.
// Records goals via commitStats. Does NOT animate.
function resolveCupTie(tie, isFinal){
  const H=byId(tie.h), A=byId(tie.a);
  if(isFinal){
    const res=simMatch(H,A,{neutral:true});commitStats(res);
    let hg=res.hg,ag=res.ag;
    if(hg===ag){do{hg=res.hg+Math.floor(RNG()*5)+1;ag=res.ag+Math.floor(RNG()*5)+1;}while(hg===ag);tie.pens=true;}
    tie.hg=res.hg;tie.ag=res.ag; // display single score
    tie.aggH=res.hg;tie.aggA=res.ag;
    tie.winner=(hg>ag)?tie.h:tie.a;
    return;
  }
  // two legs: leg1 at H, leg2 at A
  const l1=simMatch(H,A,{neutral:false});commitStats(l1);
  const l2=simMatch(A,H,{neutral:false});commitStats(l2);
  tie.leg1={hg:l1.hg,ag:l1.ag};       // H home
  tie.leg2={hg:l2.hg,ag:l2.ag};       // A home
  const aggH=l1.hg + l2.ag;           // H goals across both legs
  const aggA=l1.ag + l2.hg;           // A goals across both legs
  tie.aggH=aggH;tie.aggA=aggA;
  let wh=aggH, wa=aggA;
  if(wh===wa){ // aggregate tie -> penalties (after 2nd leg)
    do{wh=aggH+Math.floor(RNG()*5)+1;wa=aggA+Math.floor(RNG()*5)+1;}while(wh===wa);
    tie.pens=true;
  }
  tie.winner=(wh>wa)?tie.h:tie.a;
}

function advanceCupAfterRound(){

  else{S.cup.ties.push(pairUp(winners));S.cup.round++;toast(S.cup.roundNames[S.cup.round-1]+' oynandı.');}
}
function playCupRound(){
  const round=S.cup.ties[S.cup.round];
  const fin=isCupFinal();
  round.forEach(tie=>{ if(tie.winner===null) resolveCupTie(tie, fin); });
  advanceCupAfterRound();

// Hub card: player's next Cup tie
function cupHubCard(){
  if(S.cup.done) return '';
  const round=S.cup.ties[S.cup.round];
  const myTie=round.find(t=>t.h===S.myId||t.a===S.myId);
  if(!myTie || myTie.winner!==null) return '';
  const H=byId(myTie.h),A=byId(myTie.a);
  const fin=isCupFinal();
  let html='<div class="card" style="border-color:#8a6"><h3>🏆 Kupa — '+S.cup.roundNames[S.cup.round]+(fin?' (Final · Tek Maç)':' (Rövanşlı · 2 Maç)')+'</h3>';
  html+='<div class="fx mine"><div class="h">'+H.name+'</div>'+badge(H,20)+'<div class="vs">KUPA</div>'+badge(A,20)+'<div class="a">'+A.name+'</div></div>';
  html+='<div class="row" style="margin-top:12px"><button class="btn amber" onclick="playMyCupMatch()">Kupa Maçını Oyna / İzle</button><button class="btn" onclick="playCupRound()">Turu Simüle Et</button></div></div>';
  return html;
}
function playMyCupMatch(){
  const round=S.cup.ties[S.cup.round];
  const myTie=round.find(t=>t.h===S.myId||t.a===S.myId);
  if(!myTie||myTie.winner!==null){playCupRound();return;}
  const fin=isCupFinal();
  const H=byId(myTie.h),A=byId(myTie.a);

  // resolve OTHER ties silently first
  round.forEach(t=>{ if(t!==myTie && t.winner===null) resolveCupTie(t, fin); });

  if(fin){
    // single match final, animate; penalties if draw
    const res=simMatch(H,A,{neutral:true});commitStats(res);
    let hg=res.hg,ag=res.ag,penInfo=null;
    if(hg===ag){do{hg=res.hg+Math.floor(RNG()*5)+1;ag=res.ag+Math.floor(RNG()*5)+1;}while(hg===ag);myTie.pens=true;}
    myTie.hg=res.hg;myTie.ag=res.ag;myTie.aggH=res.hg;myTie.aggA=res.ag;myTie.winner=(hg>ag)?myTie.h:myTie.a;
    if(res.hg===res.ag)penInfo={winner:myTie.winner};
    liveMatch(res,()=>{advanceCupAfterRound();show('hub');},penInfo);
    return;
  }

  // two-legged: play leg 1 (animate), then leg 2 (animate), then aggregate/penalties
  const l1=simMatch(H,A,{neutral:false});commitStats(l1);
  myTie.leg1={hg:l1.hg,ag:l1.ag};
  liveMatch(l1,()=>{
    toast('1. maç bitti: '+H.short+' '+l1.hg+'-'+l1.ag+' '+A.short);
    const l2=simMatch(A,H,{neutral:false});commitStats(l2);
    myTie.leg2={hg:l2.hg,ag:l2.ag};
    const aggH=l1.hg+l2.ag, aggA=l1.ag+l2.hg;
    myTie.aggH=aggH;myTie.aggA=aggA;
    let wh=aggH,wa=aggA,penInfo=null;
    if(aggH===aggA){do{wh=aggH+Math.floor(RNG()*5)+1;wa=aggA+Math.floor(RNG()*5)+1;}while(wh===wa);myTie.pens=true;}
    myTie.winner=(wh>wa)?myTie.h:myTie.a;
    // penalties happen after leg 2 if aggregate level; winner of pens is myTie.winner
    // note: in leg2, home is A; penInfo.winner must reference the actual leg2 home/away ids
    if(aggH===aggA){ penInfo={winner:myTie.winner}; }
    liveMatch(l2,()=>{
      toast('Rövanş bitti. Toplam skor: '+H.short+' '+aggH+'-'+aggA+' '+A.short+' → '+byId(myTie.winner).short+' turladı!');
      advanceCupAfterRound();show('hub');
    }, penInfo);
  });
}

    html+='<div class="pl '+(p.starter?'starter':'')+'"><span class="pos '+p.pos+'">'+p.pos+'</span><span class="nm">'+p.name+(p.starter?' <span class="muted">(ilk 11)</span>':'')+'</span><span class="st">'+p.goals+' gol · '+p.assists+' asist</span><span class="ov">'+p.rating+'</span></div>';
  });
  html+='</div>';

  // ensure the current + a couple upcoming tournaments exist (endless cycle)
  ensureTourneyAt(NAT.idx+2);

  // schedule — show last 2 finished + current + next 2 upcoming (avoid huge list)
  html+='<div class="card"><h3>Turnuva Takvimi</h3>';
  const from=Math.max(0, NAT.idx-2);
  const to=Math.min(NAT.schedule.length, NAT.idx+3);

    const t=NAT.schedule[i];
    const status=t.done?('🏆 '+ (t.champion?natTeam(t.champion).short:'') ):(i===NAT.idx?'sıradaki':'bekliyor');
    html+='<div class="fx '+(i===NAT.idx?'mine':'')+'"><div class="h">'+t.name+'</div><div class="a"><span class="muted">📍 '+t.host+'</span></div><div style="margin-left:auto" class="pill">'+status+'</div></div>';
  }
  html+='<p class="muted" style="margin-top:6px">Turnuvalar sonsuza dek sürer — 2 yılda bir sırayla Dünya Kupası ve Avrupa Şampiyonası.</p></div>';

  const cur=NAT.schedule[NAT.idx];

  // if no active tourney, offer to start
  if(!NAT.tourney){
    // pending national-team offers after a finished tournament
    if(NAT.offers && NAT.offers.length){
      html+='<div class="card" style="border-color:var(--amber)"><h3>Milli Takım Teklifleri</h3><p class="muted">Turnuva bitti! Deneyimine göre şu milli takımlar seni istiyor. Kabul edersen o takımın başına geçersin, ya da mevcut takımınla devam edersin.</p>';
      NAT.offers.forEach(id=>{

        html+='<div class="fx"><div class="h">'+n.name+'</div>'+badge(n,20)+'<div class="a"><span class="pill">güç '+n.rating+'</span></div>'+
          '<button class="btn sm amber" style="padding:6px 12px;margin-left:auto" onclick="acceptNationJob(\''+id+'\')">Kabul Et</button></div>';
      });
      html+='<div class="row" style="margin-top:10px"><button class="btn" onclick="dismissNationOffers()">'+natTeam(NAT.picked).name+' ile devam et</button></div></div>';
    }
    const euroIneligible = (cur.type==='euro' && !EURO_NATIONS_ALL.includes(NAT.picked));
    html+='<div class="card" style="border-color:var(--amber)"><h3>'+cur.name+'</h3><p class="muted">📍 Ev sahibi: <b>'+cur.host+'</b><br>Format: '+(cur.type==='wc'?'48 takım · 12 grup · 1-2.\'ler + en iyi 8 üçüncü tur atlar':'16 takım · 4 grup · sadece Avrupa takımları')+'</p>';
    if(euroIneligible){
      html+='<p style="color:var(--live);margin-top:8px"><b>'+natTeam(NAT.picked).name+' Avrupa takımı değil</b> — Avrupa Şampiyonası\'na katılamazsın. Bu turnuvayı izleyebilir ya da atlayabilirsin.</p>';
      html+='<div class="row" style="margin-top:10px"><button class="btn amber" onclick="startTourney()">İzle (Avrupa takımlarıyla)</button><button class="btn" onclick="skipTourney()">Bu Turnuvayı Atla</button></div></div>';
    } else {
      html+='<div class="row" style="margin-top:10px"><button class="btn amber" onclick="startTourney()">Turnuvaya Başla</button></div></div>';
    }
    el.innerHTML=html;return;
  }

  // active tourney rendering
  const T=NAT.tourney;
  html+='<div class="card"><h3>'+cur.name+' — '+(T.phase==='group'?'Gruplar':(T.phase==='ko'?'Eleme':'Bitti'))+'</h3><p class="muted">📍 '+cur.host+'</p>';
  if(T.phase==='group'){
    if(T.groupRound<3){
      // does my nation have a match this round?
      let iPlay=false;
      T.fixtures.forEach((gRounds,gi)=>{ (gRounds[T.groupRound]||[]).forEach(([h,a])=>{ if(h===NAT.picked||a===NAT.picked)iPlay=true; }); });
      if(iPlay){
        html+='<div class="row"><button class="btn amber" onclick="natPlayMyGroup()">Maçımı Oyna / İzle</button><button class="btn" onclick="natGroupRound()">Turu Simüle Et ('+(T.groupRound+1)+'/3)</button></div>';
      } else {
        html+='<div class="row"><button class="btn amber" onclick="natGroupRound()">Grup Maçı Oyna ('+(T.groupRound+1)+'/3)</button></div>';
      }
    }
    else html+='<div class="row"><button class="btn amber" onclick="natStartKO()">Elemelere Geç</button></div>';
  } else if(T.phase==='ko' && !T.champion){
    const myTie=T.ties[T.koRound] && T.ties[T.koRound].find(x=>x.h===NAT.picked||x.a===NAT.picked);
    if(myTie && myTie.winner===null){
      html+='<div class="row"><button class="btn amber" onclick="natPlayMyKO()">Maçımı Oyna / İzle</button><button class="btn" onclick="natKORound()">Turu Simüle Et</button></div>';
    }else{
      html+='<div class="row"><button class="btn amber" onclick="natKORound()">'+T.koNames[T.koRound]+' Oyna</button></div>';
    }
  } else if(T.champion){
    html+='<p style="margin-top:8px">🏆 Şampiyon: <b style="color:var(--amber)">'+natTeam(T.champion).name+'</b>';
    if(T.champion===NAT.picked)html+=' — Tebrikler!';
    html+='</p>';
    // World Cup 3rd-place result
    if(T.thirdPlace){
      const tp=T.thirdPlace;
      const third=natTeam(tp.winner), fourth=natTeam(tp.winner===tp.h?tp.a:tp.h);
      html+='<p style="margin-top:4px">🥉 Üçüncü: <b>'+third.name+'</b> <span class="muted">(3.lük maçı: '+natTeam(tp.h).short+' '+tp.hg+'-'+tp.ag+' '+natTeam(tp.a).short+(tp.pens?' pen.':'')+')</span></p>';
    }
    html+='<div class="row" style="margin-top:8px"><button class="btn amber" onclick="finishTourney()">Turnuvayı Bitir (+XP)</button></div>';
  }
  html+='</div>';

  // group tables
  if(T.phase==='group'){
    T.groups.forEach((g,gi)=>{
      const rows=sortTable(Object.values(T.tables[gi]));
      html+='<div class="card grp"><h3>Grup '+String.fromCharCode(65+gi)+'</h3><table><tr><th>#</th><th>Takım</th><th class="num">O</th><th class="num">A</th><th class="num">Y</th><th class="num">P</th></tr>';
      rows.forEach((r,i)=>{const t=natTeam(r.id);const adv=(i<2)||(T.koCount===32&&i===2);const cls=(r.id===NAT.picked?'me ':'')+(i<2?'adv':'');html+='<tr class="'+cls+'"'+((T.koCount===32&&i===2)?' style="border-left:3px solid #8a6"':'')+'><td>'+(i+1)+'</td><td><div class="teamcell">'+badge(t)+t.short+'</div></td><td class="num">'+r.P+'</td><td class="num">'+r.GF+'</td><td class="num">'+r.GA+'</td><td class="num" style="color:var(--amber);font-weight:800">'+r.Pts+'</td></tr>';});
      html+='</table></div>';
    });
  } else {
    // knockout bracket
    T.ties.forEach((round,ri)=>{
      html+='<div class="card"><h3>'+T.koNames[ri]+'</h3>';
      round.forEach(tie=>{const H=natTeam(tie.h),A=natTeam(tie.a);const mine=(tie.h===NAT.picked||tie.a===NAT.picked);html+='<div class="fx '+(mine?'mine':'')+'"><div class="h">'+H.short+'</div>'+badge(H)+'<div class="sc">'+(tie.winner!==null?tie.hg+'-'+tie.ag:'—')+'</div>'+badge(A)+'<div class="a">'+A.short+'</div></div>';});
      html+='</div>';
    });
  }
  el.innerHTML=html;
}
function pickNation(id){ if(!NAT.teams.length)buildNatTeams(); NAT.picked=id; renderNations(); }
function resetNation(){ NAT.picked=null; renderNations(); } // sadece takım seçimini sıfırla; takvim/ilerleme korunur

function startTourney(){
  const cur=NAT.schedule[NAT.idx];
  buildNatTeams(); // fresh squads each tournament
  let field;
  if(cur.type==='euro'){
    // Avrupa Şampiyonası'na yalnızca Avrupa takımları katılır.
    field=EURO_NATIONS.slice();
    // if the manager's nation is European but not in the default 16, swap it in
    if(!field.includes(NAT.picked) && EURO_NATIONS_ALL.includes(NAT.picked)){
      field[field.length-1]=NAT.picked;
    }
  }
  else { // world cup: all nations
    field=NATIONS.map(n=>n.id);
  }
  // group stage: groups of 4
  const shuffled=field.slice().sort(()=>RNG()-0.5);
  const nGroups=field.length/4;
  const groups=[];for(let i=0;i<nGroups;i++)groups.push([]);
  shuffled.forEach((id,i)=>groups[i%nGroups].push(id));
  const tables=groups.map(g=>{const o={};g.forEach(id=>o[id]=emptyRow(natTeam(id)));return o;});
  const fixtures=groups.map(g=>groupRounds(g));
  // advancers: WC (12 groups) => top2 (24) + best 8 thirds = 32; Euro (4 groups) => top2 = 8
  const isWC=(cur.type==='wc');
  const koCount = isWC ? 32 : nGroups*2;
  const koNames = koCount===32?['Son 32','Son 16','Çeyrek Final','Yarı Final','Final']
                : koCount===16?['Son 16','Çeyrek Final','Yarı Final','Final']
                : koCount===8?['Çeyrek Final','Yarı Final','Final']
                : ['Yarı Final','Final'];
  NAT.tourney={type:cur.type, phase:'group', groups, tables, fixtures, groupRound:0, koRound:0, ties:[], koNames, champion:null, koCount};
  renderNations();
}
function natGroupRound(){
  const T=NAT.tourney;const r=T.groupRound;
  T.fixtures.forEach((gRounds,gi)=>{(gRounds[r]||[]).forEach(([h,a])=>{const res=simMatchNat(natTeam(h),natTeam(a));applyResult(T.tables[gi],h,a,res.hg,res.ag);commitStats(res);});});
  T.groupRound++;
  toast('Grup turu '+(r+1)+' oynandı.');
  renderNations();
}
function natPlayMyGroup(){
  const T=NAT.tourney;const r=T.groupRound;
  let myRes=null;
  T.fixtures.forEach((gRounds,gi)=>{ (gRounds[r]||[]).forEach(([h,a])=>{
    const res=simMatchNat(natTeam(h),natTeam(a));
    applyResult(T.tables[gi],h,a,res.hg,res.ag);commitStats(res);
    if(h===NAT.picked||a===NAT.picked)myRes=res;
  }); });
  T.groupRound++;
  if(myRes){ liveMatch(myRes,()=>show('nations')); }
  else { renderNations(); }
}
function natStartKO(){
  const T=NAT.tourney;
  const winners=[], runners=[], thirdsRows=[];
  const groupOf={}; // team id -> group index
  T.groups.forEach((g,gi)=>{
    const rows=sortTable(Object.values(T.tables[gi]));
    winners.push(rows[0].id); groupOf[rows[0].id]=gi;
    runners.push(rows[1].id); groupOf[rows[1].id]=gi;
    if(rows[2]){ thirdsRows.push(rows[2]); groupOf[rows[2].id]=gi; }
  });
  let thirds=[];
  if(T.koCount===32){
    thirdsRows.sort((x,y)=> y.Pts-x.Pts || (y.GF-y.GA)-(x.GF-x.GA) || y.GF-x.GF);
    thirds = thirdsRows.slice(0,8).map(r=>r.id);
  }
  const seeds = shuffle(winners.slice());
  const others = shuffle(runners.concat(thirds));
  const ties = drawSeeded(seeds, others, groupOf);
  T.phase='ko';T.ties=[ties];
  const total=ties.length*2;
  toast('Eleme kurası çekildi! (grup 1.\'leri, başka gruptan 2./3. ile eşleşti)');
  renderNations();
}
// Pair seeds (group winners) with others (runners/thirds) so that:
//  - a winner never faces another winner, and
//  - two teams from the SAME group never meet.
// Falls back gracefully if a perfect draw isn't possible.
function drawSeeded(seeds, others, groupOf){
  const ties=[];
  const pool=others.slice();
  seeds.forEach(h=>{
    let idx=pool.findIndex(a=>groupOf[a]!==groupOf[h]);
    if(idx<0) idx=0;
    if(pool.length){ const a=pool.splice(idx,1)[0]; ties.push({h,a,hg:null,ag:null,winner:null}); }
  });
  const left=shuffle(pool);
  while(left.length>1){
    const h=left.shift();
    let idx=left.findIndex(a=>groupOf[a]!==groupOf[h]);
    if(idx<0) idx=0;
    const a=left.splice(idx,1)[0];
    ties.push({h,a,hg:null,ag:null,winner:null});
  }
  fixSameGroup(ties, groupOf); // eliminate any same-group pairings by swapping opponents
  return ties;
}
// Repair pass: for any tie whose two teams share a group, swap one team with another tie
// so that neither resulting tie is same-group.
function fixSameGroup(ties, groupOf){
  for(let pass=0; pass<6; pass++){
    let fixedAny=false;
    for(let i=0;i<ties.length;i++){
      const t=ties[i];
      if(groupOf[t.h]!==groupOf[t.a]) continue; // fine
      // try swapping t.a with some other tie's a (or h) to break both same-group situations
      for(let j=0;j<ties.length;j++){
        if(j===i) continue;
        const u=ties[j];
        // swap t.a <-> u.a
        if(groupOf[t.h]!==groupOf[u.a] && groupOf[u.h]!==groupOf[t.a]){
          const tmp=t.a; t.a=u.a; u.a=tmp; fixedAny=true; break;
        }
        // swap t.a <-> u.h
        if(groupOf[t.h]!==groupOf[u.h] && groupOf[u.a]!==groupOf[t.a]){
          const tmp=t.a; t.a=u.h; u.h=tmp; fixedAny=true; break;
        }
      }
    }
    if(!fixedAny) break;
  }
}
function shuffle(arr){ return arr.slice().sort(()=>RNG()-0.5); }
function simMatchNat(h,a){ return simMatch(h,a,{neutral:true}); }
function natResolveTie(tie){
  const res=simMatchNat(natTeam(tie.h),natTeam(tie.a));let hg=res.hg,ag=res.ag;commitStats(res);
  if(hg===ag){do{hg=res.hg+Math.floor(RNG()*5)+1;ag=res.ag+Math.floor(RNG()*5)+1;}while(hg===ag);tie.pens=true;}
  tie.hg=res.hg;tie.ag=res.ag;tie.winner=(hg>ag)?tie.h:tie.a;
  return res;
}
function natKORound(){
  const T=NAT.tourney;const round=T.ties[T.koRound];
  round.forEach(tie=>{ if(tie.winner===null) natResolveTie(tie); });
  advanceNatKO();
}
function advanceNatKO(){
  const T=NAT.tourney;const round=T.ties[T.koRound];
  const winners=round.map(t=>t.winner);
  // capture semifinal losers (round of 2 ties) for the 3rd-place match
  if(round.length===2){
    T.sfLosers=round.map(t=> t.winner===t.h ? t.a : t.h );
  }
  if(winners.length===1){
    T.champion=winners[0]; T.phase='done';
    // World Cup: play a 3rd-place match between the two semifinal losers
    if(T.type==='wc' && T.sfLosers && T.sfLosers.length===2){
      const tie={h:T.sfLosers[0], a:T.sfLosers[1], hg:null, ag:null, winner:null};
      natResolveTie(tie);
      T.thirdPlace={ winner:tie.winner, hg:tie.hg, ag:tie.ag, h:tie.h, a:tie.a, pens:tie.pens };
    }
    toast('Şampiyon: '+natTeam(winners[0]).short);
  }
  else { T.ties.push(pairUp(winners)); T.koRound++; toast(T.koNames[T.koRound-1]+' oynandı.'); }
  renderNations();
}
function natPlayMyKO(){
  const T=NAT.tourney;const round=T.ties[T.koRound];
  const myTie=round.find(x=>x.h===NAT.picked||x.a===NAT.picked);
  if(!myTie||myTie.winner!==null){natKORound();return;}
  const res=natResolveTie(myTie);
  let penInfo=null;
  if(res.hg===res.ag){ penInfo={winner:myTie.winner}; } // went to penalties
  // resolve the other ties silently
  round.forEach(tie=>{if(tie.winner===null)natResolveTie(tie);});
  // show my match live, then advance
  liveMatch(res,()=>{ advanceNatKO(); show('nations'); }, penInfo);
}
function finishTourney(){
  const T=NAT.tourney;const cur=NAT.schedule[NAT.idx];
  cur.done=true;cur.champion=T.champion;
  // XP reward to club career based on how far my nation went
  let xp=0, place='Gruplar';
  // was the manager's nation actually in this tournament?
  const participated = T.groups.flat().includes(NAT.picked);
  if(!participated){
    xp=0; place='Katılmadın (izledin)';
  } else if(T.champion===NAT.picked){xp=15;place='Şampiyon 🏆';}
  else if(T.thirdPlace && T.thirdPlace.winner===NAT.picked){xp=9;place='Üçüncü 🥉';}
  else {
    // runner-up? (in the final, lost)
    const finalRound=T.ties[T.ties.length-1];
    const inFinal=finalRound&&finalRound.length===1&&(finalRound[0].h===NAT.picked||finalRound[0].a===NAT.picked);
    if(inFinal){ xp=11; place='Finalist (2.) 🥈'; }
    else {
      let survived=0;
      T.ties.forEach((round,ri)=>{ if(round.some(t=>t.winner===NAT.picked)) survived=ri+1; });
      if(survived>=T.ties.length-1){xp=8;place='Yarı Final';}
      else if(survived>=2){xp=7;place='Son etaplar';}
      else if(survived>=1){xp=5;place='Eleme turu';}
      else {
        const inKO=T.ties[0]&&T.ties[0].some(t=>t.h===NAT.picked||t.a===NAT.picked);
        xp=inKO?4:2; place=inKO?'Son 16/Eleme':'Gruplar';
      }
    }
  }
  // apply XP to active club career if one exists
  if(typeof S!=='undefined' && S){ S.managerXP=(S.managerXP||0)+xp; }
  NAT._lastReward={xp,place,tourney:cur.name};
  NAT.tourney=null;NAT.idx++;
  ensureTourneyAt(NAT.idx); // endless cycle: always have a next tournament
  NAT.offers=nationOffers(); // new national-team offers after each tournament
  toast('Turnuva bitti — '+place+' · +'+xp+' kulüp XP');
  renderNations();
}
// National-team job offers based on manager XP (az XP=zayıf ülke, çok XP=büyük ülke).
function nationOffers(){
  const xp=(typeof S!=='undefined'&&S)?(S.managerXP||0):0;
  // ceiling on national-team strength the manager can attract
  let maxRating;
  if(xp>=45) maxRating=99;      // en büyükler (Fransa, Brezilya...)
  else if(xp>=28) maxRating=86; // güçlü ülkeler
  else if(xp>=14) maxRating=82; // orta ülkeler
  else maxRating=79;            // zayıf/orta-alt ülkeler
  const pool=NATIONS.filter(n=>n.id!==NAT.picked && n.rating<=maxRating);
  pool.sort((a,b)=>b.rating-a.rating);
  // offer the 3 best the manager qualifies for + 1 random lower for variety
  const offers=pool.slice(0,3).map(n=>n.id);
  if(pool.length>4){ const r=pool[4+Math.floor(RNG()*(pool.length-4))]; if(r&&!offers.includes(r.id))offers.push(r.id); }
  return offers;
}
function acceptNationJob(id){
  NAT.picked=id;
  NAT.offers=null;
  toast(natTeam(id).name+' milli takımının başına geçtin!');
  renderNations();
}
function dismissNationOffers(){ NAT.offers=null; renderNations(); }
// Skip a tournament the manager can't enter (e.g. non-European nation during the Euro).
function skipTourney(){
  const cur=NAT.schedule[NAT.idx];
  cur.done=true; cur.champion=null; cur.skipped=true;
  NAT.tourney=null; NAT.idx++;
  ensureTourneyAt(NAT.idx);
  toast(cur.name+' atlandı.');
  renderNations();
}

  simRestLeague();
